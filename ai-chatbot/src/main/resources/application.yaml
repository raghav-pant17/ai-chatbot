spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ai-chatbot
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ai_chatbot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      repositories:
        enabled: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

chatbot:
  session-ttl-minutes: ${SESSION_TTL_MINUTES:30}
  refund-escalation-limit: ${REFUND_ESCALATION_LIMIT:5000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-production-secret}
    access-token-expiry-minutes: ${ACCESS_TOKEN_EXPIRY_MINUTES:120}
    email-verification-expiry-minutes: ${EMAIL_VERIFICATION_EXPIRY_MINUTES:10}
  ai:
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openrouter/free}
      url: ${OPENROUTER_URL:https://openrouter.ai/api/v1/chat/completions}


server:
  port: ${PORT:8080}
